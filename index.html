<!DOCTYPE html>
<html>
<head>
  <title>Mayank Nailwal | DevOps Engineer</title>
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .hero {
      padding: 60px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      color: #94a3b8;
    }

    .section {
      padding: 40px 20px;
    }

    .card {
      background: #1e293b;
      margin: 15px auto;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      max-width: 500px;
    }

    input, button {
      padding: 10px;
      margin: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #38bdf8;
      color: black;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <h1>Mayank Nailwal</h1>
    <p>DevOps & Cloud Engineer</p>
  </div>

  <!-- PROJECT -->
  <div class="section">
    <h2>🚀 My Project</h2>
    <div class="card">
      <p>Deployed full-stack app using Docker, AWS EC2, Nginx, MongoDB & CI/CD pipeline.</p>
    </div>
  </div>

  <!-- SKILLS -->
  <div class="section">
    <h2>🛠 Skills</h2>
    <div class="card">AWS</div>
    <div class="card">Docker</div>
    <div class="card">CI/CD</div>
    <div class="card">Nginx</div>
    <div class="card">MongoDB</div>
  </div>

  <!-- CONTACT -->
  <div class="section">
    <h2>📩 Contact Me</h2>

    <input type="text" id="msgInput" placeholder="Enter your message" />
    <button onclick="sendMessage()">Send</button>

    <h3>Messages:</h3>
    <div id="output"></div>
  </div>

  <script>
    async function loadData() {
      const res = await fetch("/api/message");
      const data = await res.json();

      const output = document.getElementById("output");
      output.innerHTML = "";

      data.forEach(item => {
        const p = document.createElement("p");
        p.innerText = item.text;
        output.appendChild(p);
      });
    }

    async function sendMessage() {
      const input = document.getElementById("msgInput");

      await fetch("/api/message", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: input.value })
      });

      input.value = "";
      loadData();
    }

    loadData();
  </script>

</body>
</html>
