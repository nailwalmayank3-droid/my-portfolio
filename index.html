<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mayank Nailwal | DevOps Engineer</title>
<link rel="stylesheet" href="style.css">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
  
</head>

<body>
<div class="blob"></div>
<div class="blob2"></div>
<div id="cursor-glow"></div>
<div id="progress"></div>
<div id="particles-js"></div>

<header>
  <button onclick="toggleMode()">🌙 Toggle Mode</button>
</header>

<div class="hero" data-aos="fade-up">
  <h1>Mayank Nailwal</h1>
<p id="typing"></p>
</div>

<div class="section" data-aos="fade-right">
  <h2>🚀 Projects</h2>
  <div class="cards">
    <div class="card" data-aos="flip-up">
      Full Stack Deployment using AWS, Docker, Nginx, CI/CD & MongoDB
    </div>
  </div>
</div>

<div class="section" data-aos="zoom-in">
  <h2>🛠 Skills</h2>
  <div class="cards">
    <div class="card" data-aos="flip-up">AWS</div>
    <div class="card" data-aos="flip-up">Docker</div>
    <div class="card" data-aos="flip-up">CI/CD</div>
    <div class="card" data-aos="flip-up">Nginx</div>
    <div class="card" data-aos="flip-up">MongoDB</div>
  </div>
</div>

<div class="section" data-aos="fade-left">
  <h2>📩 Contact Me</h2>

  <input type="text" id="msgInput" placeholder="Your message">
  <button onclick="sendMessage()">Send</button>

  <div id="output"></div>
</div>

<script>
  function toggleMode() {
    document.body.classList.toggle("light");
  }

  async function loadData() {
    const res = await fetch("/api/message");
    const data = await res.json();

    const output = document.getElementById("output");
    output.innerHTML = "";

    data.forEach(item => {
      const p = document.createElement("p");
      p.innerText = item.text;
      output.appendChild(p);
    });
  }

  async function sendMessage() {
    const input = document.getElementById("msgInput");

    await fetch("/api/message", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: input.value })
    });

    input.value = "";
    loadData();
  }

  loadData();
</script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 1000
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
AOS.init({ duration: 1000 });

// typing effect
const text = "I build scalable cloud systems using AWS, Docker & CI/CD 🚀";
let i = 0;
function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 40);
  }
}
typeEffect();

// particles
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 2 },
    line_linked: { enable: true }
  }
});

// scroll progress
window.onscroll = function () {
  let winScroll = document.documentElement.scrollTop;
  let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  let scrolled = (winScroll / height) * 100;
  document.getElementById("progress").style.width = scrolled + "%";
};
</script>
<script>
document.addEventListener("mousemove", function(e) {
  const glow = document.getElementById("cursor-glow");
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
