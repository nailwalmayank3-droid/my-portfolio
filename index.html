<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mayank Nailwal | DevOps Engineer</title>

  <link rel="stylesheet" href="style.css">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>
<div id="loader">Loading...</div>
<div id="cursor-glow"></div>
<div class="blob"></div>
<div class="blob2"></div>
<div id="progress"></div>
<div id="particles-js"></div>

<header>
  <button onclick="toggleMode()">🌙 Toggle Mode</button>
</header>

<section class="hero" data-aos="fade-up">
  <h1>Mayank Nailwal</h1>
  <p id="typing"></p>
</section>

<section class="section" data-aos="fade-right">
  <h2>🚀 Achievements</h2>
  <div class="cards">
    <div class="card">Full Stack Deployment using AWS, Docker, CI/CD & MongoDB</div>
  </div>
</section>

<section class="section" data-aos="zoom-in">
  <h2>🛠 Skills</h2>
  <div class="cards">
    <div class="card">AWS</div>
    <div class="card">Docker</div>
    <div class="card">CI/CD</div>
    <div class="card">Nginx</div>
    <div class="card">MongoDB</div>
  </div>
</section>

<section class="section" data-aos="fade-left">
  <h2>📩 Contact</h2>
  <input type="text" id="msgInput" placeholder="Your message">
  <button onclick="sendMessage()">Send</button>
  <div id="output"></div>
</section>

<!-- Scripts -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
AOS.init({ duration: 1000 });

// typing
const text = "I build scalable cloud systems using AWS, Docker & CI/CD 🚀";
let i = 0;
function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 40);
  }
}
typeEffect();

// particles
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 2 },
    line_linked: { enable: true }
  }
});

// scroll bar
window.onscroll = function () {
  let winScroll = document.documentElement.scrollTop;
  let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  document.getElementById("progress").style.width = (winScroll / height) * 100 + "%";
};

// cursor glow
document.addEventListener("mousemove", function(e) {
  const glow = document.getElementById("cursor-glow");
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});

// theme toggle
function toggleMode() {
  document.body.classList.toggle("light");
}

// backend
async function loadData() {
  const res = await fetch("/api/message");
  const data = await res.json();
  const output = document.getElementById("output");
  output.innerHTML = "";
  data.forEach(item => {
    const p = document.createElement("p");
    p.innerText = item.text;
    output.appendChild(p);
  });
}

async function sendMessage() {
  const input = document.getElementById("msgInput");
  await fetch("/api/message", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: input.value })
  });
  input.value = "";
  loadData();
}

loadData();
</script>
<script>
window.onload = () => {
  document.getElementById("loader").style.display = "none";
};
</script>
<script>
document.querySelectorAll("button").forEach(btn => {
  btn.addEventListener("mousemove", e => {
    const rect = btn.getBoundingClientRect();
    const x = e.clientX - rect.left - rect.width/2;
    const y = e.clientY - rect.top - rect.height/2;

    btn.style.transform = `translate(${x*0.2}px, ${y*0.2}px) scale(1.08)`;
  });

  btn.addEventListener("mouseleave", () => {
    btn.style.transform = "translate(0,0) scale(1)";
  });
});
</script>
<script>
document.querySelectorAll(".card").forEach(card => {
  card.addEventListener("mousemove", e => {
    const rect = card.getBoundingClientRect();
    card.style.setProperty("--x", e.clientX - rect.left + "px");
    card.style.setProperty("--y", e.clientY - rect.top + "px");
  });
});
</script>
<script>
const sections = document.querySelectorAll(".section");

window.addEventListener("scroll", () => {
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if (top < window.innerHeight - 100) {
      sec.classList.add("show");
    }
  });
});
</script>
<script>
window.addEventListener("scroll", () => {
  const header = document.querySelector("header");
  if (window.scrollY > 50) {
    header.classList.add("scrolled");
  } else {
    header.classList.remove("scrolled");
  }
});
</script>
<script>
document.addEventListener("mousemove", e => {
  const x = (window.innerWidth / 2 - e.pageX) / 25;
  const y = (window.innerHeight / 2 - e.pageY) / 25;

  document.querySelector(".hero").style.transform =
    `translate(${x}px, ${y}px)`;
});
</script>

</body>
</html>
