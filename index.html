<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mayank Nailwal | DevOps Engineer</title>

  <style>
  body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    transition: 0.4s;
  }

  .light {
    background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
    color: black;
  }

  header {
    padding: 20px;
    text-align: right;
  }

  button {
    padding: 8px 14px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    background: #38bdf8;
    color: black;
    font-weight: bold;
  }

  .hero {
    text-align: center;
    padding: 100px 20px;
  }

  .hero h1 {
    font-size: 50px;
    background: linear-gradient(90deg, #38bdf8, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .section {
    padding: 60px 20px;
    text-align: center;
  }

  .section h2 {
    margin-bottom: 30px;
  }

  .cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }

  .card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    margin: 15px;
    padding: 25px;
    border-radius: 15px;
    width: 260px;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  }

  input {
    padding: 12px;
    margin: 10px;
    width: 220px;
    border-radius: 8px;
    border: none;
  }

  #output p {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 6px;
    margin: 5px auto;
    width: fit-content;
  }
#particles-js {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

#progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 4px;
  background: #38bdf8;
  width: 0%;
  z-index: 999;
}
</style>
<meta charset="UTF-8">
<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
</head>

<body>
<div class="blob"></div>
<div class="blob2"></div>
<div id="cursor-glow"></div>
<div id="progress"></div>
<div id="particles-js"></div>

<header>
  <button onclick="toggleMode()">🌙 Toggle Mode</button>
</header>

<div class="hero" data-aos="fade-up">
  <h1>Mayank Nailwal</h1>
<p id="typing"></p>
</div>

<div class="section" data-aos="fade-right">
  <h2>🚀 Projects</h2>
  <div class="cards">
    <div class="card" data-aos="flip-up">
      Full Stack Deployment using AWS, Docker, Nginx, CI/CD & MongoDB
    </div>
  </div>
</div>

<div class="section" data-aos="zoom-in">
  <h2>🛠 Skills</h2>
  <div class="cards">
    <div class="card" data-aos="flip-up">AWS</div>
    <div class="card" data-aos="flip-up">Docker</div>
    <div class="card" data-aos="flip-up">CI/CD</div>
    <div class="card" data-aos="flip-up">Nginx</div>
    <div class="card" data-aos="flip-up">MongoDB</div>
  </div>
</div>

<div class="section" data-aos="fade-left">
  <h2>📩 Contact Me</h2>

  <input type="text" id="msgInput" placeholder="Your message">
  <button onclick="sendMessage()">Send</button>

  <div id="output"></div>
</div>

<script>
  function toggleMode() {
    document.body.classList.toggle("light");
  }

  async function loadData() {
    const res = await fetch("/api/message");
    const data = await res.json();

    const output = document.getElementById("output");
    output.innerHTML = "";

    data.forEach(item => {
      const p = document.createElement("p");
      p.innerText = item.text;
      output.appendChild(p);
    });
  }

  async function sendMessage() {
    const input = document.getElementById("msgInput");

    await fetch("/api/message", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: input.value })
    });

    input.value = "";
    loadData();
  }

  loadData();
</script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 1000
  });
</script>
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
AOS.init({ duration: 1000 });

// typing effect
const text = "I build scalable cloud systems using AWS, Docker & CI/CD 🚀";
let i = 0;
function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 40);
  }
}
typeEffect();

// particles
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 2 },
    line_linked: { enable: true }
  }
});

// scroll progress
window.onscroll = function () {
  let winScroll = document.documentElement.scrollTop;
  let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  let scrolled = (winScroll / height) * 100;
  document.getElementById("progress").style.width = scrolled + "%";
};
</script>
<script>
document.addEventListener("mousemove", function(e) {
  const glow = document.getElementById("cursor-glow");
  glow.style.left = e.clientX + "px";
  glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
