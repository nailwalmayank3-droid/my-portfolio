<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mayank Nailwal | DevOps Engineer</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      transition: 0.3s;
      background: #0f172a;
      color: white;
    }

    .light {
      background: #f1f5f9;
      color: black;
    }

    header {
      padding: 20px;
      text-align: right;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 45px;
    }

    .section {
      padding: 40px;
      text-align: center;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      margin: 15px;
      padding: 20px;
      border-radius: 12px;
      width: 250px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 200px;
    }

    #output p {
      background: rgba(255,255,255,0.1);
      padding: 8px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<header>
  <button onclick="toggleMode()">🌙 Toggle Mode</button>
</header>

<div class="hero">
  <h1>Mayank Nailwal</h1>
  <p>DevOps & Cloud Engineer 🚀</p>
</div>

<div class="section">
  <h2>🚀 Projects</h2>
  <div class="cards">
    <div class="card">
      Full Stack Deployment using AWS, Docker, Nginx, CI/CD & MongoDB
    </div>
  </div>
</div>

<div class="section">
  <h2>🛠 Skills</h2>
  <div class="cards">
    <div class="card">AWS</div>
    <div class="card">Docker</div>
    <div class="card">CI/CD</div>
    <div class="card">Nginx</div>
    <div class="card">MongoDB</div>
  </div>
</div>

<div class="section">
  <h2>📩 Contact Me</h2>

  <input type="text" id="msgInput" placeholder="Your message">
  <button onclick="sendMessage()">Send</button>

  <div id="output"></div>
</div>

<script>
  function toggleMode() {
    document.body.classList.toggle("light");
  }

  async function loadData() {
    const res = await fetch("/api/message");
    const data = await res.json();

    const output = document.getElementById("output");
    output.innerHTML = "";

    data.forEach(item => {
      const p = document.createElement("p");
      p.innerText = item.text;
      output.appendChild(p);
    });
  }

  async function sendMessage() {
    const input = document.getElementById("msgInput");

    await fetch("/api/message", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ text: input.value })
    });

    input.value = "";
    loadData();
  }

  loadData();
</script>

</body>
</html>
