version: '3'

services:
  frontend:
    build: .
    ports:
  - "80:80"
  - "443:443"

  backend:
    build: ./backend
    ports:
      - "5000:5000"

  mongo:
    image: mongo
    ports:
      - "27017:27017"
volumes:
  - /etc/letsencrypt/live/deploywithmayank.in/fullchain.pem:/etc/ssl/certs/fullchain.pem
  - /etc/letsencrypt/live/deploywithmayank.in/privkey.pem:/etc/ssl/private/privkey.pem