name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 16.171.236.68
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ec2-user/my-portfolio
            git reset --hard
            git pull origin main
            sudo cp -r * /usr/share/nginx/html/
            sudo systemctl restart nginx