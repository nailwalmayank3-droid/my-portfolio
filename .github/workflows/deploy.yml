name: Docker Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 16.171.236.68
          username: ec2-user
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ec2-user/my-portfolio

            git reset --hard
            git pull origin main

            # Stop all running containers
            sudo docker ps -q | xargs -r sudo docker stop
            sudo docker ps -aq | xargs -r sudo docker rm

            # Stop nginx (if running)
            sudo systemctl stop nginx || true

            # Build new image
            sudo docker build -t my-portfolio .

            # Run container
            sudo docker run -d -p 80:80 --name my-portfolio-container my-portfolio